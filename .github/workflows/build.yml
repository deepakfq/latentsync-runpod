name: Build and Push LatentSync Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          echo "After cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/latentsync-runpod:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/latentsync-runpod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image details
        run: |
          echo "✅ Built image:"
          echo "  docker.io/${{ secrets.DOCKERHUB_USERNAME }}/latentsync-runpod:latest"
          echo "  docker.io/${{ secrets.DOCKERHUB_USERNAME }}/latentsync-runpod:${{ github.sha }}"
          echo ""
          echo "Use this URL in RunPod:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/latentsync-runpod:latest"
